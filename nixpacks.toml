# Railway + Nixpacks config for CloudsWork API Server
# This is the DEFAULT service config (API backend)
# For frontend service, override commands in Railway dashboard

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
  "npm install -g pnpm@9 --quiet --no-fund",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = ["pnpm --filter @workspace/api-server run build"]

[start]
cmd = "node --enable-source-maps artifacts/api-server/dist/index.mjs"

kind = "web"
previewPath = "/"
title = "CloudsWork"
version = "1.0.0"
id = "artifacts/cloudswork"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20174

[services.development]
run = "pnpm --filter @workspace/cloudswork run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cloudswork", "run", "build" ]
publicDir = "artifacts/cloudswork/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20174"
BASE_PATH = "/"
